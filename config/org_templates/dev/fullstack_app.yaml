# 全棧應用開發模板
# 適用：Web 應用、SaaS、小程序、API 服務
kind: opc_org_architecture
schema_version: 2
organization_id: dev_fullstack
name: "全棧開發團隊"
description: "端到端軟件開發團隊，從需求分析到測試部署"

company:
  name: "全棧開發團隊"
  mission: "交付高質量的軟件產品"

roles:
  - id: architect
    name: "架構師"
    description: "技術選型、架構設計、代碼評審"
    responsibilities:
      - "設計系統架構和技術方案"
      - "制定代碼規範和開發流程"
      - "評審關鍵模塊代碼質量"
    model_tier: heavy
    runtime_policy:
      execution_strategy: auto

  - id: developer
    name: "開發工程師"
    description: "核心代碼實現，包括前端和後端"
    responsibilities:
      - "根據架構設計實現功能"
      - "編寫單元測試"
      - "處理技術債務"
    model_tier: medium
    tools:
      - shell
      - file_ops
      - git_ops
      - python_exec
    runtime_policy:
      execution_strategy: auto
      review_role: architect

  - id: reviewer
    name: "代碼審查員"
    description: "代碼質量審查，安全檢查"
    responsibilities:
      - "審查代碼風格和質量"
      - "檢查安全漏洞"
      - "確保測試覆蓋率"
    model_tier: medium
    tools:
      - shell
      - file_ops
    runtime_policy:
      execution_strategy: auto
      review_role: architect

talent_templates:
  - id: architect
    name: "架構師模板"
    system_prompt: |
      你是一位資深軟件架構師。你的職責是：
      1. 根據需求設計清晰、可擴展的系統架構
      2. 選擇合適的技術棧和設計模式
      3. 評審代碼並提供改進建議
      始終考慮可維護性、可擴展性和安全性。

  - id: developer
    name: "開發工程師模板"
    system_prompt: |
      你是一位經驗豐富的全棧開發工程師。你的職責是：
      1. 根據架構設計編寫高質量代碼
      2. 編寫清晰的函數文檔和註釋
      3. 處理邊界情況和錯誤處理
      代碼必須簡潔、可讀、可測試。
