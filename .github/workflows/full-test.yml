name: full-test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check opc/
      - name: Mypy type check
        run: mypy opc/ --ignore-missing-imports

  high-risk:
    name: high-risk / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Run high-risk area tests
        run: >
          python -m pytest -q --tb=short
          tests/test_phase_single_truth_invariants.py
          tests/test_phase_state_machine_invariants.py
          tests/test_phase_transition_hooks.py
          tests/test_work_item_transition.py
          tests/test_work_item_runtime_invariants.py
          tests/test_company_collaboration.py
          tests/test_company_reorg.py
          tests/test_company_review_flow.py
          tests/test_company_role_session_behavior.py
          tests/test_company_runtime_identity.py
          tests/test_company_runtime_suspend_resume.py
          tests/test_actor_runtime_company_mode.py
          tests/test_approval_engine.py
          tests/test_shell_safety.py
          tests/test_store_schema_migration.py
          tests/test_store_task_deletion.py
          tests/test_engine_runtime_recovery.py
          tests/test_engine_session_defaults.py
          tests/test_engine_store_binding.py
          tests/test_execution_checkpoint_cas.py
          tests/test_external_agent_monitoring.py
          tests/test_external_agent_preflight.py
          tests/test_external_session_continuity.py
          tests/test_runtime_config_enforcement.py
          tests/test_org_config_roundtrip.py
          tests/test_org_config_import_handler.py

  frontend:
    name: frontend / typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opc/plugins/office_ui/frontend_src

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: opc/plugins/office_ui/frontend_src/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --reporter=verbose
      - name: Build
        run: npm run build

  full-suite:
    name: full-suite / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [high-risk, frontend]
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Run full test suite
        run: python -m pytest -q --tb=short

  docker-build:
    name: docker-build / smoke test
    runs-on: ubuntu-latest
    needs: full-suite
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: openopc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — opc --help
        run: docker run --rm openopc:ci --help

      - name: Check image size (< 500 MB)
        run: |
          SIZE=$(docker image inspect openopc:ci --format='{{.Size}}')
          echo "Image size: $(( SIZE / 1024 / 1024 )) MB"
          if [ "$SIZE" -gt 524288000 ]; then
            echo "::error::Image exceeds 500 MB limit"
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/openopc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
